rag:
  mode: "pinecone"
  type: semantic
  chunk_size: 800
  chunk_overlap: 150
  retrieval:
    top_k: 5
    similarity_threshochroma:
    ld: 0.75
    hybrid_search: false
  memory:
    enabled: true
    conversation_window: 6
